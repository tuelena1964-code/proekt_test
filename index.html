<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Презентация помета — Lordes Pride</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: Georgia, "Times New Roman", serif;
      max-width: 36rem;
      margin: 0 auto;
      padding: 2rem 1.25rem;
      line-height: 1.6;
      color: #1a1a1a;
      background: #faf8f5;
    }
    h1 {
      font-size: 1.65rem;
      font-weight: 600;
      margin: 0 0 0.25rem;
      color: #2c2416;
    }
    .date {
      font-size: 0.95rem;
      color: #5c5346;
      margin-bottom: 2rem;
    }
    section {
      margin-bottom: 1.75rem;
    }
    h2 {
      font-size: 1rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #6b5d4a;
      margin: 0 0 0.65rem;
    }
    p { margin: 0.35rem 0; }
    .puppies {
      display: flex;
      gap: 1.5rem;
      flex-wrap: wrap;
    }
    .puppies span {
      background: #fff;
      padding: 0.5rem 0.85rem;
      border-radius: 6px;
      border: 1px solid #e5dfd4;
    }
  </style>
</head>
<body>
  <h1>Презентация помета питомника Lordes Pride</h1>
  <p class="date">24.12.2026</p>

  <section>
    <h2>Родители</h2>
    <p>Отец — <strong>Зидан</strong></p>
    <p>Мать — <strong>Береника</strong></p>
  </section>

  <section>
    <h2>Щенки</h2>
    <div class="puppies">
      <span>2 мальчика</span>
      <span>5 девочек</span>
    </div>
  </section>
</body>
</html>
